<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Service Unavailable</title>

<style>
  body {
    margin: 0;
    font-family: "Arial", sans-serif;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    text-align: center;
    max-width: 900px;
  }

  /* 503 彩色字 */
  .code {
    font-size: 140px;
    font-weight: bold;
    letter-spacing: 10px;
    background: linear-gradient(90deg,
      #ff6b6b,
      #feca57,
      #48dbfb,
      #5f27cd,
      #1dd1a1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }

  /* 小機器人區塊（簡化版） */
  .robot {
    font-size: 70px;
    margin: 20px 0;
  }

  .title {
    font-size: 28px;
    font-weight: bold;
    margin-top: 10px;
  }

  .sub {
    font-size: 18px;
    color: #666;
    margin-top: 6px;
  }

  .footer {
    margin-top: 25px;
    font-size: 16px;
    color: #888;
  }

  /* 背景裝飾 */
  .bg-blocks {
    position: absolute;
    top: 10%;
    right: 10%;
    opacity: 0.15;
    font-size: 40px;
  }
</style>
</head>

<body>

<div class="bg-blocks">🟦🟩🟨🟪🟧</div>

<div class="container">

  <div class="code">503</div>

  <div class="robot">🦎👷‍♂️💻</div>

  <div class="title">服務目前不可用</div>
  <div class="sub">Service currently unavailable</div>

  <div class="title">請稍候再試</div>
  <div class="sub">Please try again later</div>

  <div class="title">系統正在嘗試恢復連線</div>
  <div class="sub">System is attempting to restore connection</div>

  <div class="footer">
    感謝你的耐心等候，我們會盡快為您服務<br/>
    Thank you for your patience; we will serve you as soon as possible
  </div>

</div>

</body>
</html>
